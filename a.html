<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You Are My Love</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #030003; 
            touch-action: none; 
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    
    let width, height;
    
    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- MATRIX BACKGROUND ---
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*'.split('');
    const fontSize = 12;
    let columns, drops;

    function initMatrix() {
        columns = canvas.width / fontSize;
        drops = [];
        for (let x = 0; x < columns; x++) {
            drops[x] = Math.random() * canvas.height; 
        }
    }
    initMatrix();

    function drawMatrix() {
        ctx.fillStyle = 'rgba(3, 0, 3, 0.2)';
        ctx.fillRect(0, 0, width, height);
        
        ctx.fillStyle = '#ff1493'; 
        ctx.font = fontSize + 'px monospace';

        for (let i = 0; i < drops.length; i++) {
            const text = chars[Math.floor(Math.random() * chars.length)];
            ctx.globalAlpha = Math.random() > 0.5 ? 1.0 : 0.5;
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            ctx.globalAlpha = 1.0;

            if (drops[i] * fontSize > canvas.height && Math.random() > 0.95) {
                drops[i] = 0;
            }
            drops[i] += 1.5; 
        }
    }

    // --- PARTICLE SYSTEM ---
    let particles = [];
    let showFinalText = false;
    let isHeartFormed = false;

    class Particle {
        constructor(x, y) {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            this.baseX = x;
            this.baseY = y;
            this.targetX = x;
            this.targetY = y;
            this.vx = (Math.random() - 0.5) * 50; 
            this.vy = (Math.random() - 0.5) * 50;
            this.friction = 0.75; 
            this.spring = 0.15 + Math.random() * 0.1; 
            this.color = '#ffffff';
            this.glowColor = 'rgba(255, 255, 255, 0.4)';
            this.size = 3.5; 
        }

        update(time) {
            if (isHeartFormed) {
                const pulse = Math.sin(time / 150) * 5; 
                const dxCenter = this.baseX - width/2;
                const dyCenter = this.baseY - height/2;
                const distance = Math.sqrt(dxCenter*dxCenter + dyCenter*dyCenter);
                
                this.targetX = this.baseX + (dxCenter / distance) * pulse;
                this.targetY = this.baseY + (dyCenter / distance) * pulse;
            } else {
                this.targetX = this.baseX;
                this.targetY = this.baseY;
            }

            let dx = this.targetX - this.x;
            let dy = this.targetY - this.y;
            this.vx += dx * this.spring;
            this.vy += dy * this.spring;
            this.vx *= this.friction;
            this.vy *= this.friction;
            this.x += this.vx;
            this.y += this.vy;
        }

        draw() {
            ctx.fillStyle = this.glowColor;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * 2.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function getTextPoints(text) {
        const offscreen = document.createElement('canvas');
        const offCtx = offscreen.getContext('2d', { willReadFrequently: true });
        offscreen.width = width;
        offscreen.height = height;
        offCtx.fillStyle = 'white';
        offCtx.font = 'bold 220px Arial, sans-serif'; 
        offCtx.textAlign = 'center';
        offCtx.textBaseline = 'middle';
        offCtx.fillText(text, width / 2, height / 2);

        const imgData = offCtx.getImageData(0, 0, width, height).data;
        const points = [];
        const step = 10; 
        for (let y = 0; y < height; y += step) {
            for (let x = 0; x < width; x += step) {
                const index = (y * width + x) * 4;
                if (imgData[index + 3] > 128) points.push({ x, y });
            }
        }
        return points;
    }

    function getHeartPoints() {
        const points = [];
        const scale = 18; 
        const offsetX = width / 2;
        const offsetY = height / 2 - 30;

        for (let t = 0; t <= Math.PI * 2; t += 0.04) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            for(let i = 0; i < 4; i++) {
                points.push({ 
                    x: offsetX + (x * scale) + (Math.random() * 15 - 7.5), 
                    y: offsetY + (y * scale) + (Math.random() * 15 - 7.5) 
                });
            }
        }
        return points;
    }

    function setShape(shapeType) {
        let points = [];
        showFinalText = false;
        isHeartFormed = false;

        if (shapeType === 'HEART') {
            points = getHeartPoints();
            showFinalText = true;
            isHeartFormed = true;
        } else {
            points = getTextPoints(shapeType);
        }

        if (particles.length > points.length) {
            particles.splice(points.length);
        } else if (particles.length < points.length) {
            const diff = points.length - particles.length;
            for (let i = 0; i < diff; i++) {
                particles.push(new Particle(width / 2, height / 2));
            }
        }

        for (let i = 0; i < points.length; i++) {
            particles[i].baseX = points[i].x;
            particles[i].baseY = points[i].y;
            particles[i].vx = (Math.random() - 0.5) * 80;
            particles[i].vy = (Math.random() - 0.5) * 80;
            
            if (shapeType === 'HEART') {
                particles[i].color = '#ff1493';
                particles[i].glowColor = 'rgba(255, 20, 147, 0.5)'; 
            } else {
                particles[i].color = '#ffffff';
                particles[i].glowColor = 'rgba(255, 255, 255, 0.4)'; 
            }
        }
    }

    // --- MUSIC & CONTROLLER ---
    let hasStarted = false;
    let isPaused = false;
    let audioCtx;
    let nextNoteTime = 0;
    let currentNote = 0;

    const melody = [
        261.63, 329.63, 392.00, 523.25, 392.00, 329.63, 
        174.61, 220.00, 261.63, 349.23, 261.63, 220.00  
    ];

    function playNote(frequency, time) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine'; 
        osc.frequency.value = frequency;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        gain.gain.setValueAtTime(0, time);
        gain.gain.linearRampToValueAtTime(0.15, time + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, time + 1.5);
        osc.start(time);
        osc.stop(time + 1.5);
    }

    window.addEventListener('pointerdown', () => {
        if (!hasStarted) {
            hasStarted = true;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            nextNoteTime = audioCtx.currentTime + 0.1;
            lastTimestamp = performance.now(); // Reset timer properly
        } else {
            isPaused = !isPaused;
            if (isPaused) {
                audioCtx.suspend(); 
            } else {
                audioCtx.resume();
                nextNoteTime = audioCtx.currentTime + 0.1; 
            }
        }
    });

    const sequence = [
        { text: "3", time: 500 },
        { text: "2", time: 1300 },
        { text: "1", time: 2100 },
        { text: "You", time: 2900 },
        { text: "Are", time: 3700 },
        { text: "My", time: 4500 },
        { text: "Love", time: 5300 },
        { text: "HEART", time: 6500 }
    ];

    setShape('3');
    
    let currentSequenceStep = 1; 
    let animationTime = 500; 
    let lastTimestamp = 0;

    // --- MAIN RENDER LOOP ---
    function animate(timestamp) {
        requestAnimationFrame(animate);

        // START SCREEN - Prevents the black screen issue!
        if (!hasStarted) {
            ctx.fillStyle = '#030003';
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = '#ff1493'; 
            ctx.font = 'bold 30px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText("TAP ANYWHERE TO START", width / 2, height / 2);
            return;
        }

        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = timestamp - lastTimestamp;
        lastTimestamp = timestamp;

        if (isPaused) return; 

        if (audioCtx && audioCtx.state === 'running') {
            while (nextNoteTime < audioCtx.currentTime + 0.1) {
                playNote(melody[currentNote], nextNoteTime);
                nextNoteTime += 0.30; 
                currentNote = (currentNote + 1) % melody.length;
            }
        }

        animationTime += deltaTime;

        if (currentSequenceStep < sequence.length && animationTime >= sequence[currentSequenceStep].time) {
            setShape(sequence[currentSequenceStep].text);
            currentSequenceStep++;
        }

        drawMatrix();

        particles.forEach(p => {
            p.update(animationTime);
            p.draw();
        });

        if (showFinalText) {
            ctx.fillStyle = '#ffb6c1'; 
            ctx.font = 'italic bold 45px "Brush Script MT", "Comic Sans MS", cursive';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#ff1493';
            ctx.shadowBlur = 20; 
            ctx.fillText("I Love You anshu", width / 2, height / 2);
            ctx.shadowBlur = 5;
            ctx.fillStyle = '#ffffff';
            ctx.fillText("I Love You anshu", width / 2, height / 2);
            ctx.shadowBlur = 0; 
        }
    }

    requestAnimationFrame(animate);
</script>

</body>
</html>
